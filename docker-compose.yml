name: digipelago

services:
  web:
    build: .
    ports:
      - "5003:5003"
    env_file:
      - .env
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - digipelago_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  digipelago_pgdata:
